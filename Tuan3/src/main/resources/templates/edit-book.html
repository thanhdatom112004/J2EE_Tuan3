<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Sửa sách</title>
</head>
<body>
<div layout:fragment="content">
    <h1 class="mb-4">Chỉnh sửa thông tin sách</h1>
    <form th:action="@{/books/edit}" method="post" th:object="${book}" class="col-md-6">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label for="title" class="form-label">Tiêu đề sách</label>
            <input type="text" class="form-control" id="title" th:field="*{title}" required>
        </div>
        <div class="mb-3">
            <label for="author" class="form-label">Tên tác giả</label>
            <input type="text" class="form-control" id="author" th:field="*{author}" required>
        </div>
        <button type="submit" class="btn btn-primary">Cập nhật</button>
        <a th:href="@{/books}" class="btn btn-secondary ms-2">Hủy</a>
    </form>
</div>
</body>
</html>
